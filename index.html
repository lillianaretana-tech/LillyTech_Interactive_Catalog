function valueOf(a){

  if(area.includes('Operaciones')) return ["Reduce trabajo manual", "Mejora trazabilidad", "Aumenta visibilidad operativa"];
  if(area.includes('Seguridad')) return ["Reduce riesgos", "Estandariza criterios", "Fortalece cumplimiento"];
  if(area.includes('Humanos')) return ["Ordena información del personal", "Facilita seguimiento", "Apoya decisiones de RRHH"];
  if(area.includes('Estrategia')) return ["Convierte ideas en planes", "Mejora productividad", "Estructura decisiones"];
  if(area.includes('Finanzas')) return ["Agiliza estimaciones", "Ordena costos", "Facilita presupuestos"];
  return ["Mejora seguimiento", "Ordena información", "Facilita decisiones"];
}
function adaptOf(a){

  if(a.titulo.includes('Limpieza')) return ["Facilities", "Hoteles", "Hospitales", "Manufactura", "Laboratorios"];
  if(area.includes('Talento')) return ["Capacitación corporativa", "Onboarding", "Academias internas", "Equipos operativos"];
  if(area.includes('Operaciones')) return ["Facilities", "Bodegas", "Mantenimiento", "Producción", "Servicios"];
  if(area.includes('Seguridad')) return ["EHS", "Calidad", "Operaciones", "Auditoría", "Cumplimiento"];
  if(area.includes('Humanos')) return ["RRHH", "Supervisión", "Planillas", "Control documental"];
  if(area.includes('Finanzas')) return ["Ventas", "Compras", "Presupuesto", "Estimaciones"];

}

const N=sheets.length; let current=0;
const stage=document.getElementById('stage'), prevBtn=document.getElementById('prev'), nextBtn=document.getElementById('next'), metaCat=document.getElementById('metaCat'), metaNum=document.getElementById('metaNum'), barFill=document.getElementById('barFill');
const BOOK=window.matchMedia('(min-width:1024px) and (pointer:fine)').matches; let renderFn;
function commonMeta(){metaCat.textContent=sheets[current].cat;metaNum.textContent=(current+1)+' / '+N;barFill.style.width=(current/(N-1)*100)+'%';prevBtn.disabled=current===0;nextBtn.disabled=current===N-1;}
function next(){if(current<N-1){current++;renderFn();}} function prev(){if(current>0){current--;renderFn();}} function goCat(c){if(catStart[c]!=null){current=catStart[c];renderFn();}}
nextBtn.onclick=next; prevBtn.onclick=prev; document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next(); if(e.key==='ArrowLeft')prev();});
if(BOOK){
  const book=document.createElement('div'); book.className='book'; stage.insertBefore(book,stage.firstChild); const pages=[];

  renderFn=function(){pages.forEach((el,i)=>{if(i<current){el.style.transform='rotateY(-178deg) translateZ('+(i*.5)+'px)';el.style.zIndex=i;}else{el.style.transform='translateZ('+(-(i-current)*.6)+'px)';el.style.zIndex=N-i;}});commonMeta();};

} else {

  let sx=0,sy=0,moved=false; vp.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;moved=false;},{passive:true}); vp.addEventListener('touchmove',()=>{moved=true;},{passive:true}); vp.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(moved&&Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)){dx<0?next():prev();}});
