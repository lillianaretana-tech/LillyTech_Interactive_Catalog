  {eco:"Academias y capacitación",icon:"👩‍🏫",title:"Asistente Docente",url:"https://script.google.com/macros/s/AKfycbzifMzvQkM_z7webvBW8XRqNS1IPiO52Qx0jp99s9nMEPjdiTcTEAZ1z6ydaKkbRcYT2Q/exec",desc:"Asistente inteligente para docentes con apoyo en planificación, actividades, evaluaciones y organización académica.",tags:["Docentes","Educación","IA"]},
  {eco:"Academias y capacitación",icon:"🇺🇸",title:"Open AI Tutor",url:"https://open-ai-tutor--lillianaretana.replit.app/",desc:"Tutor interactivo para profesores y estudiantes de inglés con apoyo en práctica, enseñanza y desarrollo del idioma.",tags:["Inglés","Tutor","IA"]},
  {eco:"Bienestar y uso personal",icon:"📊",title:"App Transformación 360°",url:"App_Transformacion_360.html",desc:"App personal para hábitos, medidas, alimentación, ejercicio y progreso.",tags:["Hábitos","Salud","App"]},
  {eco:"IA y asistentes inteligentes",icon:"🏠",title:"Lilly — Asistente del Hogar",url:"https://lillianaretana-tech.github.io/Asistente_hogar_LRV/",desc:"Asistente inteligente para hogar, tareas, inglés, recetas y presupuesto familiar.",tags:["IA","Hogar","Asistente"]},
  {eco:"IA y asistentes inteligentes",icon:"🧠",title:"LillyTech Resource Builder",url:"https://lillianaretana-tech.github.io/Lillytech_resource/",desc:"Asistente estratégica para crear clases, rutas de aprendizaje, contenido, automatizaciones y propuestas listas para usar.",tags:["Recursos","IA","Clases"]},
  {eco:"Entretenimiento / experiencias",icon:"✨",title:"Tu Brújula Astrológica",url:"https://lillianaretana-tech.github.io/astrologia/",desc:"Experiencia interactiva de orientación astrológica con análisis personalizados, exploración espiritual y autoconocimiento.",tags:["Astrología","Espiritualidad","Experiencia"]}
];
const ecoMeta = Object.fromEntries(ECOSYSTEMS.map(e => [e[0], {theme:e[1], icon:e[2], desc:e[3]}]));
const slideIndex = {};
const sheets = [];
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const chip = t => `<span class="chip">${esc(t)}</span>`;
function openButton(t){
  if(!t.url) return `<span class="btn disabled">Demo no disponible</span>`;
  return `<a class="btn primary" href="${esc(t.url)}" target="_blank" rel="noopener">Abrir herramienta <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg></a>`;
}
function problemOf(t){
  const specific = {
    "Portal Limpieza Segura":"El personal necesita consultar químicos, SDS, pictogramas y procedimientos sin buscar documentos dispersos ni depender de memoria.",
    "SBM Safety Academy":"La cultura de seguridad requiere refuerzo constante, lenguaje claro y capacitación accesible desde cualquier dispositivo.",
    "Control Gerencial":"La gestión necesita una vista integrada de agenda, proyectos, vencimientos e indicadores para decidir rápido.",
    "SBM Inventario":"Los suministros pierden trazabilidad cuando el control vive en archivos separados o registros manuales.",
    "SBM Pedido Mensual":"Los pedidos mensuales consumen tiempo y pueden generar errores, duplicidad o falta de seguimiento.",
    "IA para el Trabajo Real":"Los equipos necesitan aprender IA con casos prácticos, no teoría desconectada del trabajo diario.",
    "Wordyssey":"El aprendizaje de inglés requiere constancia, motivación y seguimiento para sostener la práctica.",
    "FaciliDesk — Sistema de Tiquetes":"Las solicitudes se pierden cuando se administran por mensajes, llamadas o correos dispersos.",
    "Passdown Digital":"La continuidad entre turnos no debe depender de conversaciones informales.",
    "GoodCatches":"Los riesgos tempranos necesitan una vía simple para registrarse, analizarse y convertirse en acciones preventivas."
  };
  return specific[t.title] || "El proceso necesita orden, trazabilidad y una experiencia práctica que reduzca trabajo manual, errores e información dispersa.";
}
function valueOf(t){
  if(t.eco.includes("Academias")) return ["Acelera la curva de aprendizaje","Estandariza conocimiento","Facilita capacitación continua"];
  if(t.eco.includes("Operaciones")) return ["Reduce trabajo manual","Mejora trazabilidad","Aumenta visibilidad operativa"];
  if(t.eco.includes("Seguridad")) return ["Reduce riesgos","Fortalece cumplimiento","Estandariza criterios de calidad y seguridad"];
  if(t.eco.includes("Humanos")) return ["Ordena información del personal","Facilita seguimiento","Apoya decisiones de supervisión y RRHH"];
  if(t.eco.includes("IA")) return ["Aumenta productividad","Estructura contenido y recursos","Convierte conocimiento en entregables reutilizables"];
  if(t.eco.includes("Finanzas")) return ["Agiliza estimaciones","Ordena costos","Facilita presupuestos y decisiones comerciales"];
  return ["Organiza información","Facilita decisiones","Mejora la experiencia de uso"];
}
function toolSlide(t){
  const meta = ecoMeta[t.eco];
  return `<div class="slide tool ${meta.theme}">
    <div class="head"><div class="ico">${t.icon}</div><div class="kicker">${esc(t.eco)}</div><h2>${esc(t.title)}</h2></div>
    <div class="body">
      <p class="lead">${esc(t.desc)}</p>
      <div class="block"><div class="bt">Problema que resuelve</div><p>${esc(problemOf(t))}</p></div>
      <div class="block"><div class="bt">Valor para la organización</div><ul>${valueOf(t).map(v=>`<li>${esc(v)}</li>`).join("")}</ul></div>
      <div class="block"><div class="bt">Estado</div><span class="status">${esc(t.status || "Disponible")}</span></div>
      <div class="block"><div class="bt">Tags / componentes</div><div class="chips">${(t.tags||[]).map(chip).join("")}</div></div>
      <div class="actions">${openButton(t)}<a class="btn" href="${CONTACT}" target="_blank" rel="noopener">Solicitar información</a></div>
    </div>
    <div class="foot"><span class="brand">Lilly<span>Tech</span></span><span class="pg">Catálogo interactivo</span></div>
  </div>`;
}
function addSheet(cat, html){sheets.push({cat, html});}
addSheet("Portada", `<div class="slide cover"><div class="seal">LT</div><div class="eyebrow">Interactive Catalog</div><h1>Lilly<span>Tech</span></h1><p class="tagline">Un ecosistema premium de soluciones digitales para presentar, compartir y abrir herramientas desde un solo lugar.</p><div class="hint">Pasá la página <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div></div>`);
addSheet("Resumen ejecutivo", `<div class="slide page scroll"><h2>Soluciones para trabajo real</h2><p class="lead">LillyTech organiza herramientas, academias, asistentes IA y controles operativos en una experiencia ejecutiva navegable. El catálogo funciona como vitrina profesional y como acceso directo a cada solución.</p><div class="statement"><strong>De portal a presentación viva.</strong><p class="lead muted" style="margin-top:8px">La información actualizada del portal se combina con una estética tipo revista para mostrar valor, problema resuelto y botones funcionales.</p></div><div class="grid2"><div class="mini"><b>${tools.length} herramientas</b><span>Organizadas por ecosistema, con enlaces reales y fichas individuales.</span></div><div class="mini"><b>${ECOSYSTEMS.length} ecosistemas</b><span>Desde operaciones y seguridad hasta IA, finanzas, capacitación y bienestar.</span></div><div class="mini"><b>Uso comercial</b><span>Listo para presentar soluciones, compartir con clientes y reemplazar listados simples.</span></div></div></div>`);
addSheet("Metodología", `<div class="slide page method scroll"><h2>Metodología</h2><p class="lead">Cada herramienta parte de una fricción real: tareas repetitivas, información dispersa, reportes manuales, capacitación difícil de sostener o procesos sin trazabilidad.</p><div class="step"><i>1</i><div><b>Observar</b><span>Entender cómo se trabaja realmente y qué bloquea la adopción.</span></div></div><div class="step"><i>2</i><div><b>Diseñar</b><span>Convertir el problema en una experiencia simple, clara y móvil.</span></div></div><div class="step"><i>3</i><div><b>Automatizar</b><span>Usar datos, formularios, IA, reportes y flujos digitales donde aportan valor.</span></div></div><div class="step"><i>4</i><div><b>Medir</b><span>Documentar tiempo ahorrado, errores reducidos y control ganado.</span></div></div></div>`);
addSheet("Destacados", `<div class="slide featured"><h2>Proyectos destacados</h2><p class="lead muted">Accesos de alto impacto para iniciar la presentación.</p><div class="feature-grid">${tools.filter(t=>t.featured).map(t=>`<div class="feature" data-tool="${esc(t.title)}"><div class="ico">${t.icon}</div><div><b>${esc(t.title)}</b><span>${esc(t.eco)}</span></div></div>`).join("")}</div></div>`);
addSheet("Índice", `<div class="slide toc"><h2>Índice interactivo</h2><div class="sub">Tocá un ecosistema para saltar a su divisor, o buscá una herramienta para ir directo a su slide.</div><div class="search"><input id="catalogSearch" type="search" placeholder="Buscar herramienta, tag o ecosistema"><button type="button" data-clear>×</button></div><ul class="toc-list" id="catalogResults">${ECOSYSTEMS.map(e=>{const n=tools.filter(t=>t.eco===e[0]).length;return `<li class="toc-item" data-eco="${esc(e[0])}"><div class="toc-ico">${e[2]}</div><div><b>${esc(e[0])}</b><small>${esc(e[3])}</small></div><div class="toc-count">${n}</div></li>`}).join("")}</ul></div>`);
ECOSYSTEMS.forEach(([name,theme,icon,desc]) => {
  const items = tools.filter(t => t.eco === name);
  if(!items.length) return;
  slideIndex[name] = sheets.length;
  addSheet(name, `<div class="slide divider ${theme}"><div class="dico">${icon}</div><div class="eyebrow">Ecosistema</div><h2>${esc(name)}</h2><div class="cnt">${esc(desc)}<br>${items.length} herramienta${items.length>1?"s":""}</div></div>`);
  items.forEach(t => {slideIndex[t.title] = sheets.length; addSheet(name, toolSlide(t));});
});
addSheet("Cierre", `<div class="slide backcover"><div class="seal">LT</div><h2>Transformar procesos. Potenciar personas.</h2><p>Agenda una conversación para priorizar pilotos, adaptar soluciones y medir impacto.</p><div class="contact"><a class="btn wa" href="${CONTACT}" target="_blank" rel="noopener">WhatsApp ${WHATSAPP}</a><a class="btn mail" href="mailto:${EMAIL}" target="_blank" rel="noopener">${EMAIL}</a></div></div>`);
const track = document.getElementById("track"), prevBtn = document.getElementById("prev"), nextBtn = document.getElementById("next"), metaCat = document.getElementById("metaCat"), metaNum = document.getElementById("metaNum"), barFill = document.getElementById("barFill"), viewport = document.getElementById("viewport");
let current = 0;
track.innerHTML = sheets.map(s => s.html).join("");
function render(){
  track.style.transform = `translateX(-${current * 100}%)`;
  metaCat.textContent = sheets[current].cat;
  metaNum.textContent = `${current + 1} / ${sheets.length}`;
  barFill.style.width = `${current / (sheets.length - 1) * 100}%`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === sheets.length - 1;
}
function goTo(key){if(slideIndex[key] != null){current = slideIndex[key]; render();}}
function next(){if(current < sheets.length - 1){current++; render();}}
function prev(){if(current > 0){current--; render();}}
prevBtn.onclick = prev; nextBtn.onclick = next;
document.addEventListener("keydown", e => {if(e.key === "ArrowRight") next(); if(e.key === "ArrowLeft") prev();});
track.addEventListener("click", e => {
  const tool = e.target.closest("[data-tool]"), eco = e.target.closest("[data-eco]");
  if(tool){goTo(tool.getAttribute("data-tool")); return;}
  if(eco){goTo(eco.getAttribute("data-eco")); return;}
  if(e.target.closest("a, input, button, .scroll, .toc")) return;
  const r = viewport.getBoundingClientRect();
  e.clientX > r.left + r.width / 2 ? next() : prev();
});
track.addEventListener("input", e => {
  if(e.target.id !== "catalogSearch") return;
  const q = e.target.value.trim().toLowerCase();
  const list = document.getElementById("catalogResults");
  const data = q ? tools.filter(t => [t.title,t.eco,t.desc,...t.tags].join(" ").toLowerCase().includes(q)) : null;
  list.innerHTML = data ? data.map(t => `<li class="toc-item" data-tool="${esc(t.title)}"><div class="toc-ico">${t.icon}</div><div><b>${esc(t.title)}</b><small>${esc(t.eco)}</small></div></li>`).join("") || `<li class="toc-item"><div><b>Sin resultados</b><small>Probá con otro término.</small></div></li>` : ECOSYSTEMS.map(e => {const n=tools.filter(t=>t.eco===e[0]).length;return `<li class="toc-item" data-eco="${esc(e[0])}"><div class="toc-ico">${e[2]}</div><div><b>${esc(e[0])}</b><small>${esc(e[3])}</small></div><div class="toc-count">${n}</div></li>`}).join("");
});
track.addEventListener("click", e => {
  if(!e.target.matches("[data-clear]")) return;
  const input = document.getElementById("catalogSearch");
  if(input){input.value=""; input.dispatchEvent(new Event("input",{bubbles:true})); input.focus();}
});
let sx = 0, sy = 0, moved = false;
viewport.addEventListener("touchstart", e => {sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false;}, {passive:true});
viewport.addEventListener("touchmove", () => {moved=true;}, {passive:true});
viewport.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
  if(moved && Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)){dx < 0 ? next() : prev();}
});
render();
</script>
</body>
</html>
